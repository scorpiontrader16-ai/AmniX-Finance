---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/component: api-gateway
spec:
  project: default
  source:
    repoURL: https://github.com/aminpola2001-ctrl/amnixfinance.git
    targetRevision: main
    path: k8s/base/api-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
