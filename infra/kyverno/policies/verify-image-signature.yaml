# ============================================================
# 🆕 NEW — infra/kyverno/policies/verify-image-signature.yaml
# GAP-04: Kyverno ClusterPolicy — Enforce Cosign Keyless Signatures
# Repo: scorpiontrader16-ai/AmniX-Finance
# ============================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: "1.10.0"
    policies.kyverno.io/description: >-
      Rejects any Pod in the 'platform' namespace whose image was NOT signed
      by the official 'image-sign.yml' GitHub Actions workflow via Cosign
      keyless signing (Sigstore / Fulcio + Rekor).
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - platform
      verifyImages:
        - imageReferences:
            - "ghcr.io/scorpiontrader16-ai/AmniX-Finance/*"
          mutateDigest: true
          verifyDigest: true
          required: true
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/scorpiontrader16-ai/AmniX-Finance/.github/workflows/image-sign.yml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
