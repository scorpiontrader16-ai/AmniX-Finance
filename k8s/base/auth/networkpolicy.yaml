apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth
  namespace: platform
  labels:
    app: auth
spec:
  podSelector:
    matchLabels:
      app: auth
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway (HTTP :9092) ─────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9092
          protocol: TCP
    # ── من ingress-nginx للـ canary routing ────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 9092
          protocol: TCP
    # ── من monitoring للـ metrics scraping ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9092
          protocol: TCP
    # ── من platform services للـ JWKS endpoint ──────────────
    - from:
        - podSelector: {}
      ports:
        - port: 9092
          protocol: TCP
  egress:
    # ── Postgres ────────────────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # ── Redis للـ RBAC cache ─────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    # ── Keycloak للـ token exchange ──────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - port: 8080
          protocol: TCP
    # ── OTel Collector ───────────────────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    # ── DNS ──────────────────────────────────────────────────
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
