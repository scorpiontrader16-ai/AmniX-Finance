apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: processing-scaler
  namespace: platform
spec:
  scaleTargetRef:
    name: processing
  # FIX: minReplicaCount=1 (not 0) — processing must always be ready
  # Setting 0 would conflict with Deployment replicas:1 and cause scheduling issues
  minReplicaCount: 1
  maxReplicaCount: 50
  pollingInterval: 10
  cooldownPeriod: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: redpanda.platform.svc.cluster.local:9092
        consumerGroup: processing-group
        topic: raw-market-events
        lagThreshold: "50"
        offsetResetPolicy: latest
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
