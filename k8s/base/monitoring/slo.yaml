# ============================================================
# k8s/base/monitoring/slo.yaml
# SLO Definitions — AmniX-Finance Platform
# مطلوب قبل M8 (Auth service) و M11 (API Management)
# ============================================================

# ─── SLO 1: Ingestion Service Availability ────────────────
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: youtuop-slos
  namespace: monitoring
  labels:
    app: youtuop
    role: slo-rules
spec:
  groups:

    # ── Ingestion Availability SLO ─────────────────────────
    # Target: 99.9% availability (43.8 min downtime/month)
    - name: slo.ingestion.availability
      interval: 30s
      rules:

        # حساب الـ error rate
        - record: slo:ingestion:error_rate5m
          expr: |
            sum(rate(ingestion_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(ingestion_http_requests_total[5m]))

        # حساب الـ success rate (availability)
        - record: slo:ingestion:availability1h
          expr: |
            1 - (
              sum(increase(ingestion_http_requests_total{status=~"5.."}[1h]))
              /
              sum(increase(ingestion_http_requests_total[1h]))
            )

        - record: slo:ingestion:availability24h
          expr: |
            1 - (
              sum(increase(ingestion_http_requests_total{status=~"5.."}[24h]))
              /
              sum(increase(ingestion_http_requests_total[24h]))
            )

        - record: slo:ingestion:availability30d
          expr: |
            1 - (
              sum(increase(ingestion_http_requests_total{status=~"5.."}[30d]))
              /
              sum(increase(ingestion_http_requests_total[30d]))
            )

        # Alert: SLO breach burn rate (fast burn — 1h window)
        - alert: IngestionSLOFastBurn
          expr: |
            slo:ingestion:error_rate5m > (14.4 * 0.001)
          for: 5m
          labels:
            severity: critical
            slo: ingestion-availability
          annotations:
            summary: "Ingestion SLO fast burn — availability at risk"
            description: >
              Error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.
              At this rate, the monthly error budget will be exhausted in ~1 hour.

        # Alert: SLO breach burn rate (slow burn — 6h window)
        - alert: IngestionSLOSlowBurn
          expr: |
            (
              sum(rate(ingestion_http_requests_total{status=~"5.."}[6h]))
              /
              sum(rate(ingestion_http_requests_total[6h]))
            ) > (6 * 0.001)
          for: 30m
          labels:
            severity: warning
            slo: ingestion-availability
          annotations:
            summary: "Ingestion SLO slow burn — budget being consumed"
            description: >
              Error rate over 6h is 6x the SLO budget.
              Monthly error budget will be exhausted in ~5 days.

    # ── Ingestion Latency SLO ──────────────────────────────
    # Target: 95% of requests < 200ms, 99% < 1s
    - name: slo.ingestion.latency
      interval: 30s
      rules:

        - record: slo:ingestion:latency_p95_5m
          expr: |
            histogram_quantile(0.95,
              sum(rate(ingestion_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - record: slo:ingestion:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(ingestion_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - alert: IngestionLatencySLOBreach
          expr: |
            slo:ingestion:latency_p99_5m > 1.0
          for: 10m
          labels:
            severity: warning
            slo: ingestion-latency
          annotations:
            summary: "Ingestion P99 latency SLO breach"
            description: "P99 latency is {{ $value }}s — SLO target is < 1s."

    # ── Processing Service Availability SLO ───────────────
    # Target: 99.5% availability (3.6 hours downtime/month)
    - name: slo.processing.availability
      interval: 30s
      rules:

        - record: slo:processing:availability1h
          expr: |
            avg_over_time(up{job="processing"}[1h])

        - alert: ProcessingSLOBreach
          expr: |
            avg_over_time(up{job="processing"}[1h]) < 0.995
          for: 15m
          labels:
            severity: critical
            slo: processing-availability
          annotations:
            summary: "Processing SLO breach — availability < 99.5%"
            description: "Processing availability over 1h is {{ $value | humanizePercentage }}."

    # ── SLO Dashboard Records ──────────────────────────────
    - name: slo.dashboard
      interval: 60s
      rules:

        # Error budget remaining (%)
        - record: slo:ingestion:error_budget_remaining
          expr: |
            1 - (
              (1 - slo:ingestion:availability30d) / 0.001
            )

        # Ingestion throughput
        - record: slo:ingestion:throughput1m
          expr: |
            sum(rate(ingestion_events_processed_total[1m]))

    # ── Auth Service Availability SLO ──────────────────────
    # Target: 99.95% availability (21.9 min downtime/month)
    # Auth is critical path — higher target than other services
    - name: slo.auth.availability
      interval: 30s
      rules:

        - record: slo:auth:error_rate5m
          expr: |
            sum(rate(auth_login_total{status=~"5.."}[5m]))
            /
            sum(rate(auth_login_total[5m]))

        - record: slo:auth:availability1h
          expr: |
            1 - (
              sum(increase(auth_login_total{status=~"5.."}[1h]))
              /
              sum(increase(auth_login_total[1h]))
            )

        - record: slo:auth:availability30d
          expr: |
            1 - (
              sum(increase(auth_login_total{status=~"5.."}[30d]))
              /
              sum(increase(auth_login_total[30d]))
            )

        - alert: AuthSLOFastBurn
          expr: |
            slo:auth:error_rate5m > (14.4 * 0.0005)
          for: 5m
          labels:
            severity: critical
            slo: auth-availability
          annotations:
            summary: "Auth SLO fast burn — availability at risk"
            description: >
              Auth error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.
              Monthly error budget will be exhausted in ~1 hour.

        - alert: AuthSLOSlowBurn
          expr: |
            (
              sum(rate(auth_login_total{status=~"5.."}[6h]))
              /
              sum(rate(auth_login_total[6h]))
            ) > (6 * 0.0005)
          for: 30m
          labels:
            severity: warning
            slo: auth-availability
          annotations:
            summary: "Auth SLO slow burn — budget being consumed"
            description: >
              Auth error rate over 6h is 6x the SLO budget.

    # ── Auth Latency SLO ───────────────────────────────────
    # Target: 99% of requests < 100ms (auth is on critical path)
    - name: slo.auth.latency
      interval: 30s
      rules:

        - record: slo:auth:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(auth_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - alert: AuthLatencySLOBreach
          expr: |
            slo:auth:latency_p99_5m > 0.1
          for: 10m
          labels:
            severity: critical
            slo: auth-latency
          annotations:
            summary: "Auth P99 latency SLO breach"
            description: "Auth P99 latency is {{ $value }}s — SLO target is < 100ms."

    # ── Analytics Service Availability SLO ────────────────
    # Target: 99.5% availability
    - name: slo.analytics.availability
      interval: 30s
      rules:

        - record: slo:analytics:error_rate5m
          expr: |
            sum(rate(analytics_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(analytics_http_requests_total[5m]))

        - record: slo:analytics:availability30d
          expr: |
            1 - (
              sum(increase(analytics_http_requests_total{status=~"5.."}[30d]))
              /
              sum(increase(analytics_http_requests_total[30d]))
            )

        - alert: AnalyticsSLOFastBurn
          expr: |
            slo:analytics:error_rate5m > (14.4 * 0.005)
          for: 5m
          labels:
            severity: warning
            slo: analytics-availability
          annotations:
            summary: "Analytics SLO fast burn"
            description: >
              Analytics error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.

    # ── ML Engine SLO ──────────────────────────────────────
    # Target: 99% availability, P99 latency < 500ms
    - name: slo.ml-engine.availability
      interval: 30s
      rules:

        - record: slo:ml_engine:error_rate5m
          expr: |
            sum(rate(ml_engine_predictions_total{status="error"}[5m]))
            /
            sum(rate(ml_engine_predictions_total[5m]))

        - record: slo:ml_engine:availability30d
          expr: |
            1 - (
              sum(increase(ml_engine_predictions_total{status="error"}[30d]))
              /
              sum(increase(ml_engine_predictions_total[30d]))
            )

        - record: slo:ml_engine:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(ml_engine_prediction_latency_seconds_bucket[5m])) by (le)
            )

        - alert: MLEngineSLOFastBurn
          expr: |
            slo:ml_engine:error_rate5m > (14.4 * 0.01)
          for: 5m
          labels:
            severity: warning
            slo: ml-engine-availability
          annotations:
            summary: "ML Engine SLO fast burn"
            description: >
              ML Engine error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.

        - alert: MLEngineLatencySLOBreach
          expr: |
            slo:ml_engine:latency_p99_5m > 0.5
          for: 10m
          labels:
            severity: warning
            slo: ml-engine-latency
          annotations:
            summary: "ML Engine P99 latency SLO breach"
            description: "ML Engine P99 prediction latency is {{ $value }}s — target < 500ms."

    # ── Search Service SLO ─────────────────────────────────
    # Target: 99.5% availability, P95 < 300ms
    - name: slo.search.availability
      interval: 30s
      rules:

        - record: slo:search:error_rate5m
          expr: |
            sum(rate(search_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(search_http_requests_total[5m]))

        - record: slo:search:latency_p95_5m
          expr: |
            histogram_quantile(0.95,
              sum(rate(search_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - alert: SearchSLOFastBurn
          expr: |
            slo:search:error_rate5m > (14.4 * 0.005)
          for: 5m
          labels:
            severity: warning
            slo: search-availability
          annotations:
            summary: "Search SLO fast burn"
            description: >
              Search error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.

        - alert: SearchLatencySLOBreach
          expr: |
            slo:search:latency_p95_5m > 0.3
          for: 10m
          labels:
            severity: warning
            slo: search-latency
          annotations:
            summary: "Search P95 latency SLO breach"
            description: "Search P95 latency is {{ $value }}s — target < 300ms."

    # ── Realtime Service SLO ───────────────────────────────
    # Target: WebSocket connection error rate < 1%
    - name: slo.realtime.availability
      interval: 30s
      rules:

        - record: slo:realtime:error_rate5m
          expr: |
            sum(rate(realtime_connection_errors_total[5m]))
            /
            (sum(rate(realtime_messages_delivered_total[5m])) + 1)

        - alert: RealtimeSLOFastBurn
          expr: |
            slo:realtime:error_rate5m > (14.4 * 0.01)
          for: 5m
          labels:
            severity: warning
            slo: realtime-availability
          annotations:
            summary: "Realtime SLO fast burn"
            description: >
              Realtime connection error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.

    # ── SLO Dashboard — Additional Records ─────────────────
    - name: slo.dashboard.extended
      interval: 60s
      rules:

        - record: slo:auth:error_budget_remaining
          expr: |
            1 - ((1 - slo:auth:availability30d) / 0.0005)

        - record: slo:analytics:error_budget_remaining
          expr: |
            1 - ((1 - slo:analytics:availability30d) / 0.005)

        - record: slo:ml_engine:error_budget_remaining
          expr: |
            1 - ((1 - slo:ml_engine:availability30d) / 0.01)

        - record: slo:search:error_budget_remaining
          expr: |
            1 - ((1 - slo:search:availability30d) / 0.005)

    # ── Billing Service SLO ────────────────────────────────
    # Target: 99.95% availability — payment critical path
    - name: slo.billing.availability
      interval: 30s
      rules:

        - record: slo:billing:error_rate5m
          expr: |
            sum(rate(billing_webhook_processed_total{status=~"5.."}[5m]))
            /
            sum(rate(billing_webhook_processed_total[5m]))

        - record: slo:billing:availability30d
          expr: |
            1 - (
              sum(increase(billing_webhook_processed_total{status=~"5.."}[30d]))
              /
              sum(increase(billing_webhook_processed_total[30d]))
            )

        - alert: BillingSLOFastBurn
          expr: |
            slo:billing:error_rate5m > (14.4 * 0.0005)
          for: 5m
          labels:
            severity: critical
            slo: billing-availability
          annotations:
            summary: "Billing SLO fast burn — payment processing at risk"
            description: >
              Billing webhook error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.
              Monthly error budget will be exhausted in ~1 hour.

        - alert: BillingSLOSlowBurn
          expr: |
            (
              sum(rate(billing_webhook_processed_total{status=~"5.."}[6h]))
              /
              sum(rate(billing_webhook_processed_total[6h]))
            ) > (6 * 0.0005)
          for: 30m
          labels:
            severity: warning
            slo: billing-availability
          annotations:
            summary: "Billing SLO slow burn — budget being consumed"
            description: >
              Billing error rate over 6h is 6x the SLO budget.

    # ── Billing Latency SLO ────────────────────────────────
    # Target: P99 < 500ms
    - name: slo.billing.latency
      interval: 30s
      rules:

        - record: slo:billing:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(billing_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - alert: BillingLatencySLOBreach
          expr: |
            slo:billing:latency_p99_5m > 0.5
          for: 10m
          labels:
            severity: warning
            slo: billing-latency
          annotations:
            summary: "Billing P99 latency SLO breach"
            description: "Billing P99 latency is {{ $value }}s — SLO target is < 500ms."

    # ── Notifications Service SLO ──────────────────────────
    # Target: 99.5% availability, email delivery rate > 99%
    - name: slo.notifications.availability
      interval: 30s
      rules:

        - record: slo:notifications:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(notifications_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - record: slo:notifications:email_rate1h
          expr: |
            sum(increase(notifications_emails_sent_total[1h]))

        - alert: NotificationsLatencySLOBreach
          expr: |
            slo:notifications:latency_p99_5m > 1.0
          for: 10m
          labels:
            severity: warning
            slo: notifications-latency
          annotations:
            summary: "Notifications P99 latency SLO breach"
            description: "Notifications P99 latency is {{ $value }}s — target < 1s."

        - alert: NotificationsEmailDeliveryDrop
          expr: |
            sum(rate(notifications_emails_sent_total[5m])) == 0
          for: 15m
          labels:
            severity: critical
            slo: notifications-availability
          annotations:
            summary: "Notifications email delivery stopped"
            description: "No emails sent in the last 15 minutes."

    # ── Jobs Service SLO ───────────────────────────────────
    # Target: 99% job processing success rate
    - name: slo.jobs.availability
      interval: 30s
      rules:

        - record: slo:jobs:error_rate5m
          expr: |
            sum(rate(jobs_http_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(jobs_http_requests_total[5m]))

        - record: slo:jobs:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(jobs_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - alert: JobsSLOFastBurn
          expr: |
            slo:jobs:error_rate5m > (14.4 * 0.01)
          for: 5m
          labels:
            severity: warning
            slo: jobs-availability
          annotations:
            summary: "Jobs SLO fast burn"
            description: >
              Jobs error rate {{ $value | humanizePercentage }} is 14.4x the SLO budget.

        - alert: JobsQueueBacklog
          expr: |
            sum(rate(jobs_asynq_processed_total[5m])) == 0
          for: 10m
          labels:
            severity: warning
            slo: jobs-throughput
          annotations:
            summary: "Jobs queue processing stalled"
            description: "No asynq jobs processed in the last 10 minutes."

    # ── Feature Flags Service SLO ──────────────────────────
    # Target: 99.9% availability — affects all services
    - name: slo.feature-flags.availability
      interval: 30s
      rules:

        - record: slo:feature_flags:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(feature_flags_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - record: slo:feature_flags:evaluation_rate1m
          expr: |
            sum(rate(feature_flags_evaluations_total[1m]))

        - alert: FeatureFlagsLatencySLOBreach
          expr: |
            slo:feature_flags:latency_p99_5m > 0.05
          for: 5m
          labels:
            severity: critical
            slo: feature-flags-latency
          annotations:
            summary: "Feature Flags P99 latency SLO breach"
            description: >
              Feature Flags P99 latency is {{ $value }}s — target < 50ms.
              All services depending on feature flags are affected.

        - alert: FeatureFlagsEvaluationsDrop
          expr: |
            sum(rate(feature_flags_evaluations_total[5m])) == 0
          for: 5m
          labels:
            severity: critical
            slo: feature-flags-availability
          annotations:
            summary: "Feature Flags evaluations stopped"
            description: "No feature flag evaluations in 5 minutes — service may be down."

    # ── Developer Portal SLO ───────────────────────────────
    # Target: 99.5% availability
    - name: slo.developer-portal.availability
      interval: 30s
      rules:

        - record: slo:developer_portal:latency_p99_5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(developer_portal_http_request_duration_seconds_bucket[5m])) by (le)
            )

        - record: slo:developer_portal:webhook_error_rate5m
          expr: |
            sum(rate(developer_portal_webhook_deliveries_total{status=~"5.."}[5m]))
            /
            sum(rate(developer_portal_webhook_deliveries_total[5m]))

        - alert: DeveloperPortalLatencySLOBreach
          expr: |
            slo:developer_portal:latency_p99_5m > 1.0
          for: 10m
          labels:
            severity: warning
            slo: developer-portal-latency
          annotations:
            summary: "Developer Portal P99 latency SLO breach"
            description: "Developer Portal P99 latency is {{ $value }}s — target < 1s."

        - alert: DeveloperPortalWebhookFailures
          expr: |
            slo:developer_portal:webhook_error_rate5m > 0.05
          for: 10m
          labels:
            severity: warning
            slo: developer-portal-webhooks
          annotations:
            summary: "Developer Portal webhook delivery failure rate > 5%"
            description: "Webhook error rate is {{ $value | humanizePercentage }}."

    # ── Control Plane SLO ──────────────────────────────────
    # Target: 99.9% uptime — measured via up metric only
    # No custom metrics defined in source — uses Prometheus scrape health
    - name: slo.control-plane.availability
      interval: 30s
      rules:

        - record: slo:control_plane:availability1h
          expr: |
            avg_over_time(up{job="control-plane"}[1h])

        - alert: ControlPlaneSLOBreach
          expr: |
            avg_over_time(up{job="control-plane"}[1h]) < 0.999
          for: 5m
          labels:
            severity: critical
            slo: control-plane-availability
          annotations:
            summary: "Control Plane SLO breach — availability < 99.9%"
            description: "Control Plane availability over 1h is {{ $value | humanizePercentage }}."

    # ── SLO Dashboard — Billing & Operations Records ───────
    - name: slo.dashboard.operations
      interval: 60s
      rules:

        - record: slo:billing:error_budget_remaining
          expr: |
            1 - ((1 - slo:billing:availability30d) / 0.0005)

        - record: slo:notifications:emails_sent_24h
          expr: |
            sum(increase(notifications_emails_sent_total[24h]))

        - record: slo:jobs:asynq_processed_24h
          expr: |
            sum(increase(jobs_asynq_processed_total[24h]))

        - record: slo:feature_flags:evaluations_24h
          expr: |
            sum(increase(feature_flags_evaluations_total[24h]))
