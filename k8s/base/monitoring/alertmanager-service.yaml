# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: k8s/base/monitoring/alertmanager-service.yaml           ║
# ║  Status: ✏️ Modified — added publishNotReadyAddresses: true          ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ─────────────────────────────────────────────────────────────────────────────
# CHANGE FROM PREVIOUS VERSION:
#   alertmanager-headless: added `publishNotReadyAddresses: true`
#
# WHY:
#   With StatefulSet, pod alertmanager-0 starts first and waits for peer
#   alertmanager-1 before becoming Ready. Without publishNotReadyAddresses,
#   the headless Service only registers DNS for Ready pods, creating a
#   chicken-and-egg deadlock:
#     - alertmanager-0 not Ready because it can't reach alertmanager-1
#     - alertmanager-1 DNS not published because alertmanager-0 not Ready
#
#   publishNotReadyAddresses: true registers DNS for ALL pods regardless of
#   readiness, allowing both peers to discover each other during startup.
#
# UNCHANGED:
#   The ClusterIP Service (alertmanager) is byte-for-byte identical to v1.
# ─────────────────────────────────────────────────────────────────────────────

---
# ClusterIP Service — VMAlert, Grafana, Falcosidekick → AlertManager API
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
    - name: cluster
      port: 9094
      targetPort: 9094
      protocol: TCP

---
# Headless Service — StatefulSet ordinal DNS + HA peer discovery
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-headless
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager-headless
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true   # Required: allows peer DNS before pods are Ready
  selector:
    app: alertmanager
  ports:
    - name: cluster
      port: 9094
      targetPort: 9094
      protocol: TCP
