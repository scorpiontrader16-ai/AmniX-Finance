# ╔══════════════════════════════════════════════════════════════════════╗
# ║  المسار الكامل: k8s/base/monitoring/alertmanager-configmap.yaml     ║
# ║  الحالة: 🆕 جديد                                                    ║
# ╚══════════════════════════════════════════════════════════════════════╝
---
# ─────────────────────────────────────────────────────────────────────────────
# Routing منطق مبني على labels الموجودة فعلاً في alertrules.yaml:
#
#   severity: critical → PagerDuty + Slack #alerts-critical
#   severity: warning  → Slack #alerts-warnings فقط
#   component: *       → نفس المنطق (clickhouse, postgres, redpanda)
#
# ⚠️ المتغيرات PAGERDUTY_ROUTING_KEY و SLACK_WEBHOOK_URL
#    تأتي من Secret "alertmanager-secrets" وتُحقن بـ init container
#    عبر envsubst قبل تشغيل AlertManager.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app: alertmanager
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
data:
  alertmanager.yml.tmpl: |
    global:
      resolve_timeout: 5m
      # PagerDuty global — يُستخدم fallback إن لم يُحدَّد في receiver
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    # ── Inhibition Rules ─────────────────────────────────────────────
    # إذا كان الـ service نفسه عنده critical → اكبت الـ warnings منه
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: [service]

    # ── Routing ──────────────────────────────────────────────────────
    route:
      receiver: slack-warnings
      group_by: [alertname, service, component]
      group_wait:      30s
      group_interval:  5m
      repeat_interval: 4h

      routes:
        # Critical alerts → PagerDuty + Slack critical channel
        - matchers:
            - severity="critical"
          receiver: pagerduty-critical
          group_wait:      10s
          group_interval:  2m
          repeat_interval: 1h
          continue: true   # يستمر ليصل أيضاً لـ Slack

        - matchers:
            - severity="critical"
          receiver: slack-critical
          group_wait:      10s
          group_interval:  2m
          repeat_interval: 1h

        # Warning alerts → Slack warnings channel فقط
        - matchers:
            - severity="warning"
          receiver: slack-warnings
          group_wait:      30s
          group_interval:  5m
          repeat_interval: 4h

    # ── Receivers ────────────────────────────────────────────────────
    receivers:

      - name: pagerduty-critical
        pagerduty_configs:
          - routing_key: '${PAGERDUTY_ROUTING_KEY}'
            severity: critical
            description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
            details:
              service:     '{{ range .Alerts }}{{ .Labels.service }}{{ end }}'
              component:   '{{ range .Alerts }}{{ .Labels.component }}{{ end }}'
              description: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
              runbook:     '{{ range .Alerts }}{{ .Annotations.runbook }}{{ end }}'

      - name: slack-critical
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#alerts-critical'
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Service:* {{ .Labels.service }}{{ .Labels.component }}
              *Severity:* {{ .Labels.severity }}
              *Description:* {{ .Annotations.description }}
              {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

      - name: slack-warnings
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#alerts-warnings'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Service:* {{ .Labels.service }}{{ .Labels.component }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
