apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: health-routes
  namespace: platform
  labels:
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https

  rules:
    # ── HTTP → HTTPS redirect ───────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

    # ── Ingestion health ────────────────────────────────────────
    - matches:
        - path:
            type: Exact
            value: /healthz/ingestion
      backendRefs:
        - name: ingestion-stable
          port: 8080

    # ── Processing health ───────────────────────────────────────
    - matches:
        - path:
            type: Exact
            value: /healthz/processing
      backendRefs:
        - name: processing-stable
          port: 50051
