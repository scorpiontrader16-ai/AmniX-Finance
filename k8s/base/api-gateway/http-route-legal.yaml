apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: legal-routes
  namespace: platform
  labels:
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /legal
      backendRefs:
        - name: control-plane-stable
          port: 9093
