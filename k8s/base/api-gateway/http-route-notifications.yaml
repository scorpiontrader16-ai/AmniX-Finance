---
# ── Notifications API routes (JWT protected) ─────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: notifications-routes
  namespace: platform
  labels:
    app.kubernetes.io/name: notifications
    app.kubernetes.io/component: api-gateway
spec:
  parentRefs:
    - name: platform-gateway
      namespace: platform
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/notifications
          method: GET
      backendRefs:
        - name: notifications-stable
          port: 9094
          weight: 90
        - name: notifications-canary
          port: 9094
          weight: 10
    - matches:
        - path:
            type: PathPrefix
            value: /v1/notifications
          method: POST
      backendRefs:
        - name: notifications-stable
          port: 9094
          weight: 90
        - name: notifications-canary
          port: 9094
          weight: 10
    - matches:
        - path:
            type: PathPrefix
            value: /v1/notifications
          method: PUT
      backendRefs:
        - name: notifications-stable
          port: 9094
          weight: 90
        - name: notifications-canary
          port: 9094
          weight: 10
