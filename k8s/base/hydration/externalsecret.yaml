apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hydration-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: hydration-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: platform/hydration
