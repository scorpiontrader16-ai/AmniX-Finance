# k8s/base/hydration/networkpolicy.yaml
# لماذا: hydration يرسل warm-up gRPC لـ processing
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hydration
  namespace: platform
  labels:
    app: hydration
spec:
  podSelector:
    matchLabels:
      app: hydration
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway ───────────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9092
          protocol: TCP
    # ── من monitoring للـ metrics scraping ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9092
          protocol: TCP
  egress:
      # ── Processing service (gRPC warm-up) ───────────────────
      - to:
          - podSelector:
              matchLabels:
                app: processing
        ports:
          - port: 50051
            protocol: TCP
      # ── OTel Collector ───────────────────────────────────────
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: monitoring
          - podSelector:
              matchLabels:
                app: otel-collector
        ports:
          - port: 4317
            protocol: TCP
      # ── DNS ──────────────────────────────────────────────────
      - ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
