apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: analytics
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app: analytics
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 9096
          protocol: TCP
    # ── من monitoring للـ metrics scraping ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9096
          protocol: TCP
  egress:
    # DNS resolution (CoreDNS)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # outbound to platform namespace only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
