# k8s/base/analytics/networkpolicy.yaml
# لماذا: analytics يكتب في ClickHouse ويقرأ من Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: analytics
  namespace: platform
  labels:
    app: analytics
spec:
  podSelector:
    matchLabels:
      app: analytics
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway ───────────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9096
          protocol: TCP
    # ── من monitoring للـ metrics scraping ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9096
          protocol: TCP
  egress:
      # ── Postgres ────────────────────────────────────────────
      - to:
          - podSelector:
              matchLabels:
                app: postgres
        ports:
          - port: 5432
            protocol: TCP
      # ── ClickHouse (analytics hot storage) ──────────────────
      - to:
          - podSelector:
              matchLabels:
                app: clickhouse
        ports:
          - port: 9000
            protocol: TCP
      # ── OTel Collector ───────────────────────────────────────
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: monitoring
          - podSelector:
              matchLabels:
                app: otel-collector
        ports:
          - port: 4317
            protocol: TCP
      # ── DNS ──────────────────────────────────────────────────
      - ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
