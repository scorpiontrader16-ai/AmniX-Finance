# k8s/base/cilium/cilium-processing.yaml
# Cilium L7 Network Policy — Processing Service (Rust Engine)
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: processing-l7
  namespace: platform
spec:
  endpointSelector:
    matchLabels:
      app: processing

  # ── Ingress Rules ───────────────────────────────────────────────────────
  ingress:
    # gRPC من ingestion فقط — L7 method enforcement
    - fromEndpoints:
        - matchLabels:
            app: ingestion
      toPorts:
        - ports:
            - port: "50051"
              protocol: TCP
          rules:
            http:
              - method: "POST"
                path: "/processing.v1.ProcessingEngineService/.*"

    # gRPC من hydration service — warm-up calls
    - fromEndpoints:
        - matchLabels:
            app: hydration
      toPorts:
        - ports:
            - port: "50051"
              protocol: TCP
          rules:
            http:
              - method: "POST"
                path: "/processing.v1.ProcessingEngineService/.*"

    # Metrics من Prometheus
    - fromEndpoints:
        - matchLabels:
            app: prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/metrics"

    # Health checks
    - fromEntities:
        - health

  # ── Egress Rules ────────────────────────────────────────────────────────
  egress:
    # Redpanda consumer
    - toEndpoints:
        - matchLabels:
            app: redpanda
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP

    # OTel Collector
    - toEndpoints:
        - matchLabels:
            app: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP

    # DNS
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
