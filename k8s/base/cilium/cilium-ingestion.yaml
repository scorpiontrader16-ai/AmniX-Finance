# k8s/base/cilium/cilium-ingestion.yaml
# Cilium L7 Network Policy — Ingestion Service
# يحل محل NetworkPolicy العادي ويضيف L7 HTTP + mTLS enforcement
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: ingestion-l7
  namespace: platform
spec:
  endpointSelector:
    matchLabels:
      app: ingestion

  # ── Ingress Rules ───────────────────────────────────────────────────────
  ingress:
    # gRPC من processing service فقط — L7 enforcement
    - fromEndpoints:
        - matchLabels:
            app: processing
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
          rules:
            http:
              - method: "POST"
                path: "/processing.v1.ProcessingEngineService/.*"

    # HTTP metrics + health — من Prometheus فقط
    - fromEndpoints:
        - matchLabels:
            app: prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
          rules:
            http:
              - method: "GET"
                path: "/metrics"

    # Health checks من kube-system (probes)
    - fromEntities:
        - health

    # HTTP events endpoint — من ingress controller فقط
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: ingress-nginx
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
          rules:
            http:
              - method: "POST"
                path: "/v1/events"
              - method: "GET"
                path: "/healthz"
              - method: "GET"
                path: "/readyz"

  # ── Egress Rules ────────────────────────────────────────────────────────
  egress:
    # Redpanda — Kafka protocol
    - toEndpoints:
        - matchLabels:
            app: redpanda
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP

    # Processing gRPC
    - toEndpoints:
        - matchLabels:
            app: processing
      toPorts:
        - ports:
            - port: "50051"
              protocol: TCP

    # OTel Collector
    - toEndpoints:
        - matchLabels:
            app: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP

    # ClickHouse
    - toEndpoints:
        - matchLabels:
            app: clickhouse
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP

    # Postgres
    - toEndpoints:
        - matchLabels:
            app: postgres
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

    # MinIO S3
    - toEndpoints:
        - matchLabels:
            app: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP

    # DNS — مطلوب دائماً
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
