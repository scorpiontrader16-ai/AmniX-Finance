# k8s/base/vault/external-secrets.yaml
# ============================================================
# FIX 1: Namespace 'external-secrets' حُذف — موجود في namespaces.yaml
# FIX 2: ServiceAccount 'external-secrets' حُذف — موجود في k8s/base/external-secrets/
# FIX 3: QUESTDB_PASSWORD حُذف — QuestDB مش موجود، استُبدل بـ ClickHouse
# ============================================================

# ── ClusterSecretStore: connects cluster to Vault ─────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: platform-services
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# ── Ingestion secrets from Vault ──────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ingestion-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ingestion-secrets
    creationPolicy: Owner
  data:
    - secretKey: REDPANDA_API_KEY
      remoteRef:
        key: platform/ingestion
        property: redpanda_api_key
    - secretKey: DATA_SOURCE_API_KEY
      remoteRef:
        key: platform/ingestion
        property: data_source_api_key

---
# ── Processing secrets from Vault ─────────────────────────
# FIX: QUESTDB_PASSWORD → CLICKHOUSE_PASSWORD + POSTGRES_PASSWORD
# (QuestDB اتشال من الـ stack، استُبدل بـ ClickHouse كـ hot store)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: processing-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: processing-secrets
    creationPolicy: Owner
  data:
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: platform/processing
        property: clickhouse_password
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: platform/processing
        property: postgres_password
    - secretKey: REDPANDA_API_KEY
      remoteRef:
        key: platform/processing
        property: redpanda_api_key
