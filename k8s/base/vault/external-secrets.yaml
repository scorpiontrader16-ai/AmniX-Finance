---
# External Secrets Operator namespace + ServiceAccount
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
---
# ClusterSecretStore: connects cluster to Vault
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: platform-services
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Ingestion secrets from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ingestion-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ingestion-secrets
    creationPolicy: Owner
  data:
    - secretKey: REDPANDA_API_KEY
      remoteRef:
        key: platform/ingestion
        property: redpanda_api_key
    - secretKey: DATA_SOURCE_API_KEY
      remoteRef:
        key: platform/ingestion
        property: data_source_api_key
---
# Processing secrets from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: processing-secrets
  namespace: platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: processing-secrets
    creationPolicy: Owner
  data:
    - secretKey: QUESTDB_PASSWORD
      remoteRef:
        key: platform/processing
        property: questdb_password
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: platform/processing
        property: postgres_password
