apiVersion: v1
kind: ServiceAccount
metadata:
  name: search
  namespace: platform
  labels:
    app: search
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: search
  namespace: platform
  labels:
    app: search
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["search-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: search
  namespace: platform
  labels:
    app: search
subjects:
  - kind: ServiceAccount
    name: search
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: search
