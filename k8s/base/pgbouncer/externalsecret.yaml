# ╔══════════════════════════════════════════════════════════════════╗
# ║  المسار الكامل: k8s/base/pgbouncer/externalsecret.yaml          ║
# ║  الحالة: 🆕 جديد                                                ║
# ╚══════════════════════════════════════════════════════════════════╝
---
# ─────────────────────────────────────────────────────────────────────────────
# يجب إنشاء هذا السر في AWS Secrets Manager قبل التطبيق:
#
# aws secretsmanager create-secret \
#   --name "platform/pgbouncer" \
#   --secret-string '{
#     "userlist.txt": "\"pgbouncer_auth\" \"md5<MD5_HASH>\"\n",
#     "PGBOUNCER_AUTH_PASSWORD": "<PASSWORD>"
#   }'
#
# لحساب MD5:
#   echo -n "md5$(echo -n '<PASSWORD>pgbouncer_auth' | md5sum | cut -c1-32)"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pgbouncer-userlist
  namespace: platform
  labels:
    app: pgbouncer
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: connection-pooler
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: pgbouncer-userlist
    creationPolicy: Owner
  data:
    - secretKey: userlist.txt
      remoteRef:
        key: platform/pgbouncer
        property: userlist.txt
