# ╔══════════════════════════════════════════════════════════════════╗
# ║  المسار الكامل: k8s/base/ingestion/rollout.yaml                 ║
# ║  الحالة: ✏️ معدل — إضافة TLS volume + mount + env vars          ║
# ╚══════════════════════════════════════════════════════════════════╝
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      serviceAccountName: ingestion
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ingestion
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ingestion
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: topology.kubernetes.io/zone
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [redpanda]
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: ingestion
      volumes:
        # ── ✏️ مُضاف: cert-manager TLS — يُجدَّد تلقائياً كل 90 يوم ──
        - name: tls
          secret:
            secretName: ingestion-tls-secret
      containers:
        - name: ingestion
          image: ghcr.io/scorpiontrader16-ai/youtuop-1/ingestion:1.0.0
          ports:
            - name: grpc
              containerPort: 8090
              protocol: TCP
            - name: http
              containerPort: 9091
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: "8090"
            - name: HTTP_PORT
              value: "9091"
            - name: REDPANDA_BROKERS
              value: redpanda:9092
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
            # ── ✏️ مُضاف: مسارات TLS ──
            - name: TLS_CERT_PATH
              value: /etc/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /etc/tls/tls.key
            - name: TLS_CA_PATH
              value: /etc/tls/ca.crt
          envFrom:
            - secretRef:
                name: ingestion-secrets
          volumeMounts:
            # ── ✏️ مُضاف: TLS mount ──
            - name: tls
              mountPath: /etc/tls
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      canaryService: ingestion-canary
      stableService: ingestion-stable
      trafficRouting:
        nginx:
          stableIngress: ingestion-stable
      steps:
        - setWeight: 10
        - pause:
            duration: 2m
        - analysis:
            templates:
              - templateName: error-rate-check
        - setWeight: 50
        - pause:
            duration: 5m
        - analysis:
            templates:
              - templateName: error-rate-check
              - templateName: latency-check
        - setWeight: 100
      autoPromotionEnabled: false

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: error-rate-check
  namespace: platform
spec:
  metrics:
    - name: error-rate
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            sum(rate(ingestion_http_requests_total{status=~"5.*"}[2m]))
            /
            sum(rate(ingestion_http_requests_total[2m]))
      successCondition: result[0] < 0.01

---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: latency-check
  namespace: platform
spec:
  metrics:
    - name: p99-latency
      interval: 60s
      failureLimit: 3
      provider:
        prometheus:
          address: http://victoria-metrics.monitoring.svc.cluster.local:8428
          query: |
            histogram_quantile(0.99,
              sum(rate(ingestion_http_request_duration_seconds_bucket[2m]))
              by (le)
            )
      successCondition: result[0] < 0.5
