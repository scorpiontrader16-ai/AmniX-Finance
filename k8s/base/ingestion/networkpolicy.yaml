apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
spec:
  podSelector:
    matchLabels:
      app: ingestion
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway فقط ─────────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 8080
          protocol: TCP
    # ── من ingress-nginx (للتوافق مع الـ canary routing) ───────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
    # ── من monitoring فقط للـ metrics ──────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9090
          protocol: TCP
  egress:
    # ── Redpanda فقط — لا direct calls لأي service ─────────────
    # هذا هو جوهر Event-Driven: ingestion ينشر events فقط
    - to:
        - podSelector:
            matchLabels:
              app: redpanda
      ports:
        - port: 9092
          protocol: TCP
    # ── OTel للـ tracing ────────────────────────────────────────
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    # ── Postgres للـ persistence ────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    # ── ClickHouse للـ analytics ────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: clickhouse
      ports:
        - port: 9000
          protocol: TCP
        - port: 8123
          protocol: TCP
    # ── MinIO للـ object storage ────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
          protocol: TCP
    # ── DNS ─────────────────────────────────────────────────────
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
