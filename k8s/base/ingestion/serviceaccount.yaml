apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ingestion-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
subjects:
  - kind: ServiceAccount
    name: ingestion
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ingestion
