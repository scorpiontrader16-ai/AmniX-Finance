apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
    app.kubernetes.io/name: ingestion
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
# لماذا true: Vault Agent Injector يحتاج SA token للتحقق من الهوية مع Vault
# false يمنع الـ sidecar من الحصول على dynamic credentials
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ingestion-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingestion
  namespace: platform
  labels:
    app: ingestion
subjects:
  - kind: ServiceAccount
    name: ingestion
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ingestion
