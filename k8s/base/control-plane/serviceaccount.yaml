apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["control-plane-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: platform
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: control-plane
