apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
spec:
  podSelector:
    matchLabels:
      app: control-plane
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # فقط من الـ API Gateway — super_admin فقط
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9095
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9095
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
