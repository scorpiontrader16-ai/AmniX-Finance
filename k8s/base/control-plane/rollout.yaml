apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: control-plane
  namespace: platform
  labels:
    app: control-plane
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      serviceAccountName: control-plane
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: control-plane
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/scorpiontrader16-ai/youtuop-1/control-plane:1.0.0
          ports:
            - name: http
              containerPort: 9095
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: "9095"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
          envFrom:
            - secretRef:
                name: control-plane-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9095
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9095
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      canaryService: control-plane-canary
      stableService: control-plane-stable
      trafficRouting:
        nginx:
          stableIngress: control-plane-stable
      steps:
        - setWeight: 50
        - pause:
            duration: 5m
        - setWeight: 100
      autoPromotionEnabled: false
