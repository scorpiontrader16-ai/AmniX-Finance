apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-quality
  namespace: platform
  labels:
    app.kubernetes.io/name: data-quality
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: youtuop-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: data-quality
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # الـ monitoring scrape metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9101
    # داخل platform namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
      ports:
        - port: 9101
  egress:
    # postgres
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
      ports:
        - port: 5432
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
