apiVersion: v1
kind: ServiceAccount
metadata:
  name: cross-region-sync
  namespace: sync
  labels:
    app.kubernetes.io/name: cross-region-sync
    app.kubernetes.io/component: cross-region-sync
    app.kubernetes.io/part-of: youtuop-platform
  annotations:
    # IRSA — IAM role for S3 cross-region access
    eks.amazonaws.com/role-arn: "REPLACE_ME_WITH_IRSA_ROLE_ARN"
automountServiceAccountToken: false
