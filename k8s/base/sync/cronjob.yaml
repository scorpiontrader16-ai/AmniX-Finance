# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: k8s/base/sync/cronjob.yaml                              ║
# ║  Runs every hour — syncs cold-data S3 bucket to secondary region    ║
# ╚══════════════════════════════════════════════════════════════════════╝
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cross-region-sync
  namespace: sync
  labels:
    app.kubernetes.io/name: cross-region-sync
    app.kubernetes.io/component: cross-region-sync
    app.kubernetes.io/part-of: youtuop-platform
spec:
  schedule: "0 * * * *"          # every hour
  concurrencyPolicy: Forbid       # no overlapping runs
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3300  # 55 min — must finish before next run
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cross-region-sync
            app.kubernetes.io/part-of: youtuop-platform
        spec:
          serviceAccountName: cross-region-sync
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          priorityClassName: system-cluster-critical

          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault

          containers:
            - name: sync
              image: amazon/aws-cli:2.15.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/sync.sh"]

              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]

              env:
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: cross-region-sync-config
                      key: source_region
                - name: DEST_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: cross-region-sync-config
                      key: dest_region
                - name: SOURCE_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: cross-region-sync-config
                      key: source_bucket
                - name: DEST_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: cross-region-sync-config
                      key: dest_bucket

              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

              volumeMounts:
                - name: sync-script
                  mountPath: /scripts
                  readOnly: true
                - name: tmp
                  mountPath: /tmp

          volumes:
            - name: sync-script
              configMap:
                name: cross-region-sync-script
                defaultMode: 0555
            - name: tmp
              emptyDir: {}

          nodeSelector:
            kubernetes.io/arch: arm64

          tolerations:
            - key: node-role.kubernetes.io/spot
              operator: Exists
              effect: NoSchedule
---
# ── Region config — override per overlay ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: cross-region-sync-config
  namespace: sync
  labels:
    app.kubernetes.io/name: cross-region-sync
    app.kubernetes.io/part-of: youtuop-platform
data:
  source_region: "us-east-1"
  dest_region: "eu-west-1"
  source_bucket: "amnix-cold-data"
  dest_bucket: "amnix-cold-data-dr"
