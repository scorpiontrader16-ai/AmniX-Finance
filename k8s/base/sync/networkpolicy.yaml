# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: k8s/base/sync/networkpolicy.yaml                        ║
# ║  Allow egress to AWS S3 only — block all ingress                    ║
# ╚══════════════════════════════════════════════════════════════════════╝
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cross-region-sync
  namespace: sync
  labels:
    app.kubernetes.io/name: cross-region-sync
    app.kubernetes.io/part-of: youtuop-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cross-region-sync
  policyTypes:
    - Ingress
    - Egress
  ingress: []           # no ingress — CronJob pods are outbound-only
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS — AWS S3 endpoints
    - ports:
        - port: 443
          protocol: TCP
