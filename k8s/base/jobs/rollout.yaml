apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: jobs
  namespace: platform
  labels:
    app: jobs
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: jobs
  template:
    metadata:
      labels:
        app: jobs
    spec:
      serviceAccountName: jobs
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: jobs
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: jobs
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: jobs
      containers:
        - name: jobs
          image: ghcr.io/scorpiontrader16-ai/youtuop-1/jobs:1.0.0
          ports:
            - name: http
              containerPort: 9097
              protocol: TCP
            - name: grpc
              containerPort: 8097
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: "9097"
            - name: GRPC_PORT
              value: "8097"
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: otel-collector:4317
          envFrom:
            - secretRef:
                name: jobs-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9097
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9097
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
  strategy:
    canary:
      canaryService: jobs-canary
      stableService: jobs-stable
      trafficRouting:
        nginx:
          stableIngress: jobs-stable
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
      autoPromotionEnabled: false
