# k8s/base/jobs/networkpolicy.yaml
# لماذا: jobs يكتب في Postgres ويرسل events لـ Kafka
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jobs
  namespace: platform
  labels:
    app: jobs
spec:
  podSelector:
    matchLabels:
      app: jobs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway ───────────────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9097
          protocol: TCP
    # ── من monitoring للـ metrics scraping ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9097
          protocol: TCP
        - port: 8097
          protocol: TCP
  egress:
      # ── Postgres ────────────────────────────────────────────
      - to:
          - podSelector:
              matchLabels:
                app: postgres
        ports:
          - port: 5432
            protocol: TCP
      # ── Redpanda/Kafka ───────────────────────────────────────
      - to:
          - podSelector:
              matchLabels:
                app: redpanda
        ports:
          - port: 9092
            protocol: TCP
      # ── OTel Collector ───────────────────────────────────────
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: monitoring
          - podSelector:
              matchLabels:
                app: otel-collector
        ports:
          - port: 4317
            protocol: TCP
      # ── DNS ──────────────────────────────────────────────────
      - ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
