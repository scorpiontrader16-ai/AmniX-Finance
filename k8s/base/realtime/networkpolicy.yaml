apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: realtime
  namespace: platform
  labels:
    app: realtime
spec:
  podSelector:
    matchLabels:
      app: realtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # ── من API Gateway (HTTP + WebSocket upgrade) ───────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9099
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 9099
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 9099
          protocol: TCP
  egress:
    # ── Redpanda Kafka ────────────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: redpanda
      ports:
        - port: 9092
          protocol: TCP
    # ── Auth service للـ JWKS ─────────────────────────────────
    - to:
        - podSelector:
            matchLabels:
              app: auth
      ports:
        - port: 9092
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
