# ============================================================
# .github/workflows/image-sign.yml — Fixed
# ============================================================
name: Build & Sign Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/ingestion/**'
      - 'services/processing/**'
      - 'proto/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ─── Ingestion: context = services/ingestion ─────────────
  build-sign-ingestion:
    name: Build & Sign — Ingestion
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # لازم fetch-depth: 0 عشان يجيب الـ tags
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get current version
        id: version
        run: |
          # FIX: head -1 بيرجع exit 0 حتى لو فاضي — لازم فحص isEmpty
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VERSION="${LATEST#v}"
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Build & Push — Ingestion
        id: build-ingestion
        uses: docker/build-push-action@v5
        with:
          # Ingestion Dockerfile: لا يحتاج proto — context = services/ingestion
          context: .
          file: services/ingestion/Dockerfile.arm64
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ingestion:latest
            ghcr.io/${{ github.repository }}/ingestion:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — Ingestion
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/ingestion@${{ steps.build-ingestion.outputs.digest }}

  # ─── Processing: context = . (repo root) ─────────────────
  build-sign-processing:
    name: Build & Sign — Processing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # لازم fetch-depth: 0 عشان يجيب الـ tags
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get current version
        id: version
        run: |
          # FIX: head -1 بيرجع exit 0 حتى لو فاضي — لازم فحص isEmpty
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VERSION="${LATEST#v}"
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Build & Push — Processing
        id: build-processing
        uses: docker/build-push-action@v5
        with:
          # FIX: Processing Dockerfile يحتاج proto/ → context = . (repo root)
          # Dockerfile.arm64 يقول: COPY services/processing/ . و COPY proto/ ../../proto/
          context: .
          file: services/processing/Dockerfile.arm64
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/processing:latest
            ghcr.io/${{ github.repository }}/processing:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/processing:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — Processing
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/processing@${{ steps.build-processing.outputs.digest }}
