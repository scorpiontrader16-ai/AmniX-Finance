name: Build & Sign Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/**'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-sign-ingestion:
    name: Build & Sign — Ingestion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — Ingestion
        id: build-ingestion
        uses: docker/build-push-action@v5
        with:
          context: services/ingestion
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ingestion:latest
            ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — Ingestion
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/ingestion@${{ steps.build-ingestion.outputs.digest }}

  build-sign-processing:
    name: Build & Sign — Processing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — Processing
        id: build-processing
        uses: docker/build-push-action@v5
        with:
          context: services/processing
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/processing:latest
            ghcr.io/${{ github.repository }}/processing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — Processing
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/processing@${{ steps.build-processing.outputs.digest }}
