name: Load Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Test scenario'
        required: true
        type: choice
        options: [smoke, load, stress]
        default: smoke
      ingestion_url:
        description: 'Ingestion service URL'
        required: true
        default: 'http://ingestion-stable.platform.svc.cluster.local:8080'
      processing_url:
        description: 'Processing service URL'
        required: true
        default: 'http://processing-stable.platform.svc.cluster.local:50051'

jobs:
  load-test:
    name: k6 — ${{ github.event.inputs.scenario || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -s https://packagecloud.io/install/repositories/loadimpact/k6/script.deb.sh | sudo bash
          sudo apt-get install -y k6
          k6 version

      - name: Set URLs
        run: |
          echo "INGESTION_URL=${{ github.event.inputs.ingestion_url }}"   >> $GITHUB_ENV
          echo "PROCESSING_URL=${{ github.event.inputs.processing_url }}" >> $GITHUB_ENV

      - name: Run smoke test
        run: |
          mkdir -p results
          k6 run \
            --env SCENARIO=smoke \
            --env INGESTION_URL=${{ env.INGESTION_URL }} \
            --env PROCESSING_URL=${{ env.PROCESSING_URL }} \
            --out json=results/smoke.json \
            scripts/load-tests/ingestion.js

      - name: Run selected scenario
        if: github.event.inputs.scenario != 'smoke'
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          k6 run \
            --env SCENARIO=$SCENARIO \
            --env INGESTION_URL=${{ env.INGESTION_URL }} \
            --env PROCESSING_URL=${{ env.PROCESSING_URL }} \
            --out json=results/${SCENARIO}.json \
            scripts/load-tests/ingestion.js

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.event.inputs.scenario || 'smoke' }}-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          SCENARIO="${{ github.event.inputs.scenario || 'smoke' }}"
          {
            echo "## k6 Load Test Results"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Scenario   | \`${SCENARIO}\` |"
            echo "| Ingestion  | \`${{ env.INGESTION_URL }}\` |"
            echo "| Processing | \`${{ env.PROCESSING_URL }}\` |"
            echo "| Commit     | \`${{ github.sha }}\` |"
            echo "| Run ID     | \`${{ github.run_id }}\` |"
          } >> $GITHUB_STEP_SUMMARY
