# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Full path: .github/workflows/promote-staging-to-prod.yml           ║
# ║  Status: 🆕 New — GAP-01 Step 4                                     ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# ─────────────────────────────────────────────────────────────────────────────
# الغرض:
#   ترقية service من staging إلى production عبر تحديث newTag في
#   k8s/overlays/production/{service}/kustomization.yaml
#   ArgoCD (platform-appset) يلتقط التغيير ويُزامن production تلقائياً
#
# دورة الحياة الكاملة:
#   1. release.yml  → يبني image جديد → يُحدِّث staging overlay newTag
#   2. platform-appset → يُزامن staging تلقائياً (ArgoCD)
#   3. هذا الـ workflow → يُحدِّث production overlay newTag (يدوي)
#   4. platform-appset → يُزامن production تلقائياً (ArgoCD)
#
# المدخلات:
#   service: اسم الـ service من قائمة الـ 15 service
#   version: الـ version للترقية (اختياري — يُقرأ من staging إذا لم يُحدَّد)
#
# الأمان:
#   • concurrency: cancel-in-progress: false — لا نلغي ترقية جارية أبداً
#   • semver validation: يرفض version بصيغة خاطئة
#   • git diff check: لا commit إذا لا يوجد تغيير فعلي
#   • retry logic: 3 محاولات مع exponential backoff عند push failure
#   • [skip ci]: يمنع trigger CI على commit الترقية
#
# التطبيق:
#   GitHub → Actions → Promote Staging to Production → Run workflow
# ─────────────────────────────────────────────────────────────────────────────
name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to promote'
        required: true
        type: choice
        options:
          - ingestion
          - processing
          - auth
          - billing
          - notifications
          - feature-flags
          - control-plane
          - developer-portal
          - tenant-operator
          - hydration
          - analytics
          - search
          - jobs
          - realtime
          - ml-engine
      version:
        description: 'Version to promote (e.g. 1.2.3) — leave empty to use current staging version'
        required: false
        type: string

concurrency:
  group: promote-${{ github.event.inputs.service }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote:
    name: Promote ${{ github.event.inputs.service }} → production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install yq
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/mikefarah/yq/releases/download/v4.43.1/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Resolve version
        id: resolve
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          SERVICE="${{ github.event.inputs.service }}"
          VERSION="${{ github.event.inputs.version }}"

          STAGING_FILE="k8s/overlays/staging/${SERVICE}/kustomization.yaml"
          PROD_FILE="k8s/overlays/production/${SERVICE}/kustomization.yaml"

          # ── Preflight checks ────────────────────────────────────────────
          if [ ! -f "${STAGING_FILE}" ]; then
            echo "::error::Staging overlay not found: ${STAGING_FILE}"
            exit 1
          fi

          if [ ! -f "${PROD_FILE}" ]; then
            echo "::error::Production overlay not found: ${PROD_FILE}"
            exit 1
          fi

          # ── Auto-detect version من staging إذا لم يُحدَّد ──────────────
          if [ -z "${VERSION}" ]; then
            VERSION=$(yq '.images[0].newTag' "${STAGING_FILE}")
            echo "Auto-detected staging version: ${VERSION}"
          fi

          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "::error::Could not determine version — check images[0].newTag in ${STAGING_FILE}"
            exit 1
          fi

          # ── Validate semantic version format (x.y.z) ────────────────────
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${VERSION}' — expected x.y.z (e.g. 1.2.3)"
            exit 1
          fi

          echo "version=${VERSION}"        >> "${GITHUB_OUTPUT}"
          echo "staging_file=${STAGING_FILE}" >> "${GITHUB_OUTPUT}"
          echo "prod_file=${PROD_FILE}"    >> "${GITHUB_OUTPUT}"
          echo "service=${SERVICE}"        >> "${GITHUB_OUTPUT}"

      - name: Read current production version
        id: current
        run: |
          set -euo pipefail
          CURRENT=$(yq '.images[0].newTag' "${{ steps.resolve.outputs.prod_file }}")
          echo "current_version=${CURRENT}" >> "${GITHUB_OUTPUT}"
          echo "Current production: ${CURRENT}"
          echo "Promoting to:       ${{ steps.resolve.outputs.version }}"

      - name: Update production kustomization
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          VERSION="${{ steps.resolve.outputs.version }}"
          PROD_FILE="${{ steps.resolve.outputs.prod_file }}"

          yq -i ".images[0].newTag = \"${VERSION}\"" "${PROD_FILE}"

          echo "Updated ${PROD_FILE}:"
          cat "${PROD_FILE}"

      - name: Commit and push
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          SERVICE="${{ steps.resolve.outputs.service }}"
          VERSION="${{ steps.resolve.outputs.version }}"
          FROM="${{ steps.current.outputs.current_version }}"
          PROD_FILE="${{ steps.resolve.outputs.prod_file }}"

          git add "${PROD_FILE}"

          # لا commit إذا لا يوجد تغيير فعلي
          if git diff --staged --quiet; then
            echo "⚠️  No changes — production already at version ${VERSION}"
            exit 0
          fi

          # [skip ci] — يمنع trigger CI مجدداً على هذا الـ commit
          git commit -m "chore(promote): ${SERVICE} ${FROM} → ${VERSION} [skip ci]"

          # Retry logic — max 3 attempts مع exponential backoff
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ Promoted ${SERVICE}: ${FROM} → ${VERSION}"
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "::error::Failed to push after 3 attempts"
              exit 1
            fi
            echo "Push failed — attempt ${attempt}/3 — retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
            git pull --rebase origin main
          done
