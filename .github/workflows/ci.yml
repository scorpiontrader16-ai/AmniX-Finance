name: Load Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Test scenario'
        required: true
        type: choice
        options: [smoke, load, stress]
        default: smoke
      ingestion_url:
        description: 'Ingestion service URL'
        required: true
        default: 'http://ingestion-stable.platform.svc.cluster.local:8080'
      processing_url:
        description: 'Processing service URL'
        required: true
        default: 'http://processing-stable.platform.svc.cluster.local:50051'

jobs:
  load-test:
    name: k6 — ${{ github.event.inputs.scenario || 'smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # ── Install k6 ────────────────────────────────────────────────
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install -y k6
          k6 version

      # ── Setup cluster access (إذا توفر kubeconfig) ───────────────
      - name: Configure kubeconfig
        if: ${{ secrets.KUBECONFIG_B64 != '' }}
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install kubectl
        if: ${{ secrets.KUBECONFIG_B64 != '' }}
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      # ── Port-forward إذا كان عندنا cluster ────────────────────────
      - name: Port-forward services
        if: ${{ secrets.KUBECONFIG_B64 != '' }}
        run: |
          kubectl port-forward svc/ingestion-stable  8080:8080 -n platform &
          kubectl port-forward svc/processing-stable 50051:50051 -n platform &
          echo "INGESTION_URL=http://localhost:8080"   >> $GITHUB_ENV
          echo "PROCESSING_URL=http://localhost:50051" >> $GITHUB_ENV
          sleep 5

      # ── إذا مفيش cluster — استخدم الـ URLs من الـ input ──────────
      - name: Set URLs from input
        if: ${{ secrets.KUBECONFIG_B64 == '' }}
        run: |
          echo "INGESTION_URL=${{ github.event.inputs.ingestion_url || 'http://ingestion-stable.platform.svc.cluster.local:8080' }}"   >> $GITHUB_ENV
          echo "PROCESSING_URL=${{ github.event.inputs.processing_url || 'http://processing-stable.platform.svc.cluster.local:50051' }}" >> $GITHUB_ENV

      # ── Smoke (دايماً يشتغل أول) ──────────────────────────────────
      - name: Run smoke test
        run: |
          mkdir -p results
          k6 run \
            --env SCENARIO=smoke \
            --env INGESTION_URL=${{ env.INGESTION_URL }} \
            --env PROCESSING_URL=${{ env.PROCESSING_URL }} \
            --out json=results/smoke.json \
            scripts/load-tests/ingestion.js

      # ── Load / Stress (حسب الاختيار) ─────────────────────────────
      - name: Run selected scenario
        if: >
          github.event.inputs.scenario != '' &&
          github.event.inputs.scenario != 'smoke'
        run: |
          SCENARIO="${{ github.event.inputs.scenario }}"
          k6 run \
            --env SCENARIO=$SCENARIO \
            --env INGESTION_URL=${{ env.INGESTION_URL }} \
            --env PROCESSING_URL=${{ env.PROCESSING_URL }} \
            --out json=results/${SCENARIO}.json \
            scripts/load-tests/ingestion.js

      # ── Upload results ─────────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.event.inputs.scenario || 'smoke' }}-${{ github.run_id }}
          path: results/
          retention-days: 30

      # ── Summary ────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          SCENARIO="${{ github.event.inputs.scenario || 'smoke' }}"
          {
            echo "## k6 Load Test Results"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Scenario     | \`${SCENARIO}\` |"
            echo "| Ingestion    | \`${{ env.INGESTION_URL }}\` |"
            echo "| Processing   | \`${{ env.PROCESSING_URL }}\` |"
            echo "| Commit       | \`${{ github.sha }}\` |"
            echo "| Run ID       | \`${{ github.run_id }}\` |"
          } >> $GITHUB_STEP_SUMMARY
