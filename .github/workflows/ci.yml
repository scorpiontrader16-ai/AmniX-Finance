name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-proto:
    name: Proto Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint proto files
        working-directory: proto
        run: buf lint

  build-go:
    name: Go — Ingestion Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod
      - name: Tidy dependencies
        working-directory: services/ingestion
        run: go mod tidy
      - name: Build
        working-directory: services/ingestion
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=ci" \
            -trimpath \
            ./cmd/server
      - name: Vet
        working-directory: services/ingestion
        run: go vet ./...
      - name: Test
        working-directory: services/ingestion
        run: go test ./... -timeout 60s

  build-rust:
    name: Rust — Processing Service
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libsasl2-dev \
            cmake
      - name: Setup Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'
          components: clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/processing/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/processing/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build
        working-directory: services/processing
        run: cargo build --release
      - name: Test
        working-directory: services/processing
        run: cargo test
      - name: Clippy
        working-directory: services/processing
        run: cargo clippy -- -D warnings

  validate-terraform:
    name: Terraform — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform 1.7
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
      - name: Validate Production
        working-directory: infra/terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate Staging
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init -backend=false
          terraform validate
      - name: Validate Modules
        run: |
          for dir in infra/terraform/modules/*/; do
            echo "→ Validating: $dir"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  validate-k8s:
    name: Kubernetes — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      - name: Validate K8s manifests
        run: |
          for f in $(find k8s -name "*.yaml" ! -name "kustomization.yaml"); do
            echo "→ Checking: $f"
            kubectl apply --dry-run=client -f "$f"
          done
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
      - name: Validate kustomize
        run: |
          kustomize build k8s/overlays/production/ingestion > /dev/null
          kustomize build k8s/overlays/production/processing > /dev/null

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-go, build-rust]
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        env:
          CLICKHOUSE_USER: platform
          CLICKHOUSE_PASSWORD: platform
          CLICKHOUSE_DB: events
        ports:
          - 8123:8123
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/ingestion/go.mod

      - name: Install tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          
          # Install ClickHouse client correctly
          curl https://clickhouse.com/ | sh
          sudo mv clickhouse /usr/local/bin/clickhouse-client
          
          # Install mc client
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc \
            -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc

      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:8123/ping"; then
              echo "✅ ClickHouse ready"
              exit 0
            fi
            sleep 2
          done
          echo "❌ ClickHouse not ready"
          exit 1

      - name: Setup ClickHouse
        run: |
          # Create database and user if needed
          echo "Creating database and user..."
          clickhouse-client \
            --host localhost \
            --port 9000 \
            --user default \
            --password "" \
            --query "CREATE DATABASE IF NOT EXISTS events"
          
          echo "Applying schema..."
          clickhouse-client \
            --host localhost \
            --port 9000 \
            --user default \
            --password "" \
            --multiquery \
            < infra/clickhouse/init.sql

      - name: Run Postgres migrations
        run: |
          goose \
            -dir services/ingestion/internal/postgres/migrations \
            postgres \
            "postgres://platform:platform@localhost:5432/platform?sslmode=disable" \
            up

      - name: Run integration tests
        working-directory: services/ingestion
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: platform
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "9000"
          CLICKHOUSE_DB: events
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
        run: |
          go test -tags=integration -v -timeout=120s \
            ./internal/clickhouse/... \
            ./internal/postgres/...
