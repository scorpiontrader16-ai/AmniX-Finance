name: Read Auth Files

on:
  workflow_dispatch:

jobs:
  read-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find auth structure
        run: |
          echo "━━━━ auth directory structure ━━━━"
          find . -path "*/auth*" -name "*.go" | sort
          echo "━━━━ jwt files ━━━━"
          find . -name "*.go" | xargs grep -l "jwt\|JWT" 2>/dev/null | sort
