# ─────────────────────────────────────────────────────────────────────────────
# Mimir — Local Development Config
# Long-term metrics storage — بيستقبل من OTel Collector وTempo
#
# Endpoints:
#   HTTP: http://mimir:9009
#   remote_write: http://mimir:9009/api/v1/push
#   query: http://mimir:9009/prometheus
# ─────────────────────────────────────────────────────────────────────────────

# Single-process mode للـ local dev
target: all

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

limits:
  # local dev — relax الـ limits
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_global_series_per_user: 1000000
  # Retention 30 يوم للـ local dev
  compactor_blocks_retention_period: 30d

memberlist:
  join_members:
    - localhost
