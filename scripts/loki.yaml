# ─────────────────────────────────────────────────────────────────────────────
# Loki — Local Development Config
# Receives logs from OTel Collector and stores them on disk.
# ─────────────────────────────────────────────────────────────────────────────
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store:        tsdb
      object_store: filesystem
      schema:       v13
      index:
        prefix: index_
        period: 24h

ruler:
  # local dev: alertmanager مش موجود — نعطّل الـ ruler
  # في K8s: alertmanager.monitoring.svc.cluster.local:9093
  alertmanager_url: http://localhost:9093
  enable_api: true

limits_config:
  # Allow out-of-order log ingestion (common with distributed systems)
  allow_structured_metadata: true
  volume_enabled: true
  # Retention للـ local dev — 72 ساعة
  retention_period: 72h

# Query config للـ local dev
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
