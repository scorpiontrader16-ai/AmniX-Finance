# ============================================================
# release.yml — Semantic Versioning & Release Automation
# يتشغل تلقائياً على كل push لـ main
# ينشئ git tag بـ v1.2.3 ويبني Docker images بالـ version
# ============================================================
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ─── حساب الـ version الجديد ─────────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_version }}
      tag: ${{ steps.semver.outputs.tag }}
      changelog: ${{ steps.semver.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: semver
        run: |
          # جيب آخر tag
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v0.0.0")
          echo "Latest tag: $LATEST"

          # فصّل الأجزاء
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # حدد نوع الـ bump من الـ commit messages
          BUMP="${{ github.event.inputs.bump }}"
          if [ -z "$BUMP" ]; then
            COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          echo "Bump type: $BUMP"

          # احسب الـ version الجديد
          case $BUMP in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT

          # اعمل changelog من الـ commits
          CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s (%h)" 2>/dev/null | head -20 || echo "- Initial release")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "New version: $NEW_TAG"

  # ─── بناء ونشر Docker images بالـ version ───────────────
  build-and-tag:
    name: Build, Tag & Sign Images
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ingestion, processing]
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set service context
        id: ctx
        run: |
          echo "context=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "dockerfile=services/${{ matrix.service }}/Dockerfile.arm64" >> $GITHUB_OUTPUT

      - name: Build & Push — ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.dockerfile }}
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.version.outputs.new_version }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.new_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image — ${{ matrix.service }}
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}

  # ─── إنشاء الـ Git Tag والـ GitHub Release ──────────────
  create-release:
    name: Create GitHub Release
    needs: [version, build-and-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Git Tag
        run: |
          git tag -a ${{ needs.version.outputs.tag }} \
            -m "Release ${{ needs.version.outputs.tag }}"
          git push origin ${{ needs.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Release ${{ needs.version.outputs.tag }}"
          body: |
            ## What's Changed

            ${{ needs.version.outputs.changelog }}

            ## Docker Images

            ```bash
            # Ingestion Service
            docker pull ghcr.io/${{ github.repository }}/ingestion:${{ needs.version.outputs.new_version }}

            # Processing Service
            docker pull ghcr.io/${{ github.repository }}/processing:${{ needs.version.outputs.new_version }}
            ```

            ## Verify Image Signatures
            ```bash
            cosign verify ghcr.io/${{ github.repository }}/ingestion:${{ needs.version.outputs.new_version }}
            cosign verify ghcr.io/${{ github.repository }}/processing:${{ needs.version.outputs.new_version }}
            ```
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
